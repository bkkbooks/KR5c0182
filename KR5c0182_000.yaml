body:
  text: 老君音誦誡經力二老君曰煩道不至至道不煩按如修行諸男女官見吾誦誡科律心自開悟可請㑹民同友以吾誡律著按上作單章表奏受誡明慎奉行如律令老君曰道官籙生初受誡律之時向誡經八拜正立經前若師若友執經作八胤樂音誦受者伏誦經意卷後訖後八拜止若不解音誦者但直誦而巳其誡律以兩若相成之常當恭謹若展轉授同友及弟子按法傳之明慎奉行如律令老君曰道官籙生未使寫經誡律脫誤増損一字有不得抄撮寫誡三紙二紙不說卷首使科律不具災當及身吾此科誡自有典事之官隨經誡監臨明慎奉行如律令老君曰吾漢安元年以道授陵立爲係天師之位佐國扶命陵以地上苦難不堪千年之主者求乞昇天吾乃勉陵身元元之心賜登昇之藥百錬之酒陵得昇雲躡虚上入天官從陵昇度以來曠官寘職來久不立係天師之位吾使諸州郡縣土地真官注氣治理鬼事領籍生民戸口不用生人祭酒理民濁亂之法而後人道官諸祭酒愚闇相傳自署治籙符契攻錯經法濁亂清真言有三百六十契令能使長生鬼神萬端惑亂百姓授人職契録取人金銀財帛而治民戸恐動威逼教人𧵥願匹帛牛犢奴婢衣裳或有歳輸全絹一匹功薄輸絲一兩衆雜病說不可稱數妄傳陵身所授黄赤房中之術授人夫妻婬風大行損辱道教有祭酒之官稱父死子係使道益荒濁誡曰道尊徳貴惟賢是授若子胤不肖豈有繼承先業有祭酒之官子之不肖用行顚倒逆節縱横錯亂道法何有承係之理者乎鐵劵首云父死子係何是近世生官王者之法制耳吾今未立地上係天師正位據聽道官愚闇相傳自署治籙諸道官祭酒可簡賢授明末復按前父死子係使道教不顯吾論一事吾豈死有子孫係吾老君天師之後天道無親惟賢是授明慎奉行如律令老君曰吾得嵩嶽鎮土之靈集仙官主表聞稱言地上生民曠官來久世間修善之人求生科福尋緒詐僞經書修行無效思得真賢正法之教宜立地上係天師之位爲範則今有上谷㓂謙之隱學嵩嶽少室精錬教法掬知人鬼之情文身宜理行合自然未堪係天師之位吾是以東遊臨觀子身汝知之不乎吾數未至不應見身於世謙之汝就係天師正位並教生民佐國扶命勤理道法斷發黄赤以諸官祭酒之官校人治籙符契取人金銀財帛衆雜功𧵥願盡皆斷禁一從吾樂章誦誡新法其僞詐經法科勿復承用謙之受誡二宿三日掬㝷窈冥之情老君召謙之臨言臣以蒙覆愚而不進有不賜長生神藥不能役使鬼神何能化惡爲善消災伏異師範之則願道哀念賜存生命須老君出於世之時得有神藥之應皆道氣入身乃敢受係天師之位願録愚誠老君曰吾以汝受天官内治領中外官臨統真職可比係天師同位吾今聽汝一讓之辭吾此樂音之教誡從天地一正變易以來不出於世今運數應出汝好宜教誡科律法人治民祭酒按而行之奉順誡約之後吾當勑下九州四海之内土地真官之神騰籍戸言其有祭酒道民奉法有功然後於中方有當簡擇種民録名文昌宫中若道官祭酒不閑教化者導及養生之術有疑事不了汝當與決之分明順奉行如律令太上老君樂音誦誡令文曰我以今世人作惡者多父不慈子不孝臣不忠運數應然當疫毒臨之惡人死盡吾是以引而逺去乃之崑崙山上世間惡人共相魚肉死者甚多其中濫枉良善吾愍之辛苦時復東度覆護善人九州四海之内土地真神五嶽官屬盡集對各說土居好德異同林言事實稱今世人惡但作死事修善者少世間詐僞攻錯經道惑亂愚民但言老君當治李弘應出天下縱横返逆者衆稱名李弘歳歳有之其中精感鬼神白日人見惑亂萬民稱鬼神語愚民信之誑詐萬端稱官設號蟻聚人衆壞亂土地稱劉舉者甚多稱李弘者亦復不少吾大瞋怒念此惡人以我作辭者乃爾多乎世間愚癡之人何乃如此吾治在崑崙山山上臺觀衆樓殿堂宫室連接相次珍寳金銀衆香種數雜合錯飾蘭香桂樹窮竒異獸鳳凰衆鳥棲於樹上神龍騏𩦸以爲家畜仙人玉女盡集其上若欲遊行乗雲駕龍呼吸萬里天地人民鬼神令屬於我我豈用作地上一城之主也我不願之若我應出形之時宜欲攻易天地經典故法盡皆殄滅更出新正命應長生之者賜給神藥昇仙度世隨我左右惡人化善遇我之者盡皆延年若國王天子治民有功輒使伏杜如故若治民失法明聖代之安民平定之後還當昇舉伏宅崑崙我出之時乗駕九龍之車龍有九色連錢斑文車有羽盖十二出檀梓爲車飾以金銀珠玉雜色竒異不可目名徴召天下真官海嶽風伯雨師役使萬鬼傾天綱縮地脉廻轉天地如廻我身把捉日月能令天地晝闇仙人玉女軿車侍從鍾鼓音樂遍滿虚空百獸真徒鳳凰衆鳥翔于其上天地運動人衆鬼兵無有邊際見我威光無不弭伏我哉愚人誑詐無端人人欲作不臣聚集逋逃罪逆之人及以奴僕𨽻皂之間詐稱李弘我身寧可入此下俗臭肉奴狗魍魎之中作此惡逆者哉世人奸欺誦讀僞書切壞經典輸吾多少共相殘害豈不痛哉吾出誦誡宜令世人咸使知聞好加思㝷努力修善修善功成可得遇真延年益筭明慎奉行如律令老君曰吾初立天師授署道教治籙符契豈有取人一錢之法乎喻如生官署職有財錢若干吾今並出新法按而奉順從今以後無有分傳說願輸送倣署治籙無有財帛民戸雜願歳常保口廚具産生男女百災疾病光恠衆說廚願盡皆斷之惟有校藏三分收一即其民市買計廚㑹就家解散易復可詣師治民有病患生命有分唯存香火一心章表可得感徹唯聽民戸歳輸紙三十張筆一管墨一挺以供治表捄度之功若有道官濁心不除不從正教聽民更從新科正法清教之師明慎奉行如律令老君曰祭酒之官遷功之後子孫清徹聦明閑練鬼事可就明師受署治籙符誡承繼父後若子孫用行顚倒與俗不别不順科約者諸官平處奏表天曹聽民更受明慎奉行如律令老君曰道民或有家宅說願廚具不由師治者師即時使還令民市備爲㑹解散老君音誦誡曰道民不練科法不能精勤香火消災散禍及病痛行來憂慮縣官光恠衆諸欲有保說者盡不聽聽先啓何以故也此戸安道以求福是誤事也自今以後道民若有求願先修廚㑹之具請若集啓設求願其一事求上之收福無他明慎奉行如律令老君曰道官授署職治符籙隨家豐儉意欲設㑹任意人數三人以上復能重設諸餚和㑹可通若不能者無苦也明慎奉行如律令老君曰廚㑹之上齋七日中齋三日下齋先宿一日齋法素飯菜一日食米三升斷房室五辛生菜諸肉盡斷勤修善行不出由行不經䘮穢新産欲就㑹時向香火八拜使大德精進之人在坐首作好飯槃在坐上頭人别作槃其參同不奉道者請㑹無苦而世間愚人真以所奉不同便作異意不齋慢道科法不爲主人求思恭肅之故坐㑹之中瞋恚無常從今以後諸官以意科處思㝷妙㫖苟能同心福願之人參爾無苦㑹既還家爲主人燒香逕宿三過香火牋言爲甲乙之家所請廚㑹解求某事恩福願得道氣覆護明慎奉行如律令老君曰廚㑹之法應下三槃初小食中酒後飯今世人多不能三下槃但酒爲前五升爲限明慎奉行如律令老君曰男女官受治籙天官叩章順誡之人萬邪不惑當喻如生官臣使夫有職之人道民豈能欺犯者乎道官祭酒愚闇相傳自署治籙爲請佩千部將軍吏兵相惑亂請之僞吏兵衛護盡皆無有正可常佩受署某官而巳通神得道之人遇值仙官諸受職籙者不得五人三人吏兵給吏然地上愚人自署相倣何可能有此百千萬重將軍吏兵管護者哉從今以去故時爲事未復承用明慎奉行如律令老君曰請客就㑹人習嚴整衣服如生官天子殿㑹恭肅共同明慎奉行如律令老君曰道民奉戸師如生民事官等言則稱道民明慎奉行如律令老君曰其受治籙誡之人弟子朝拜之喻如禮生官位吏禮法等同明慎奉行如律令老君曰道官祭酒授人職治符籙但與其道受佩之後不能精進違科犯約用行顚倒奸怨非法遊行民間讀僞科律詐惑萬端世間不奉道之家民有疾病危困輙便攺動我道者當與治差愚人無智輙便動移操米束薪投戸治病謂病當差返受死亡死亡之後先以功變所還本屬輒即爲民然病者得差便言得道恩福言道有神唱告於世世人聞之有䘮禍變恠縣官復有攺屬歸化之者戸口漸多而戸生祭酒顚倒無常用行逆節婬盗殺生體性短少逼迫恐動衒神賣道其於無則詐見老君兼復感悟如是神教語致使民心懷歎恨積有復道官我俱奉戸主何以不如他師奉事禮拜使人有暫正欲更就明賢言科法難犯如此之徒毒可檢校其衰禍阨運命有長短自有一定非是愚人道官所能延逺詐惑之人濁亂道法若有此輩此諸官參詳所集化戸作廚㑹取民辭狀道官連名表章聽民攺屬民不得輒自移叛明慎奉行如律令老君曰吾觀視世間凡愚祭酒化戸領民上章奏上練文書多者十紙五紙少者三紙二紙多之以少都無頭緒萬億章奏逹者無一何以爾者土地真官典事主者懼罪相連覆停稽違吾令並出音誦歌誡宣勑諸官章書之法如似生官文書可得逹理凡愚道官不練章表奏不就於明能學習練法世間道官遷逹亡人度星作爲二十三十紙千萬美說於事不如修謹善行齋練苦身香火自纓百日功建爲先亡父母遷度魂靈月月單章言逹齋功勝於千通度星遊說之事齋功不逹無有感徹之理先齋立功却上度星章無有雜色米絲紙筆正爲先亡集賢㑹燒香㧞免亡人最上可不度星煩道不至至道不煩從今以後思㝷誦誡明慎奉行如律令老君曰道官籙生男女民燒香求願法入靖東向懇三上香訖八拜便脫巾帽九叩頭三搏頰滿三訖啓言男官甲乙今日時燒香願言上啓便以手捻香著爐中口並言願甲乙以年七以來過罪得除長生延年復上香願言某乙三宗五祖七世父母前亡後死免離苦難得在安樂之處後上香言願門内大小口數端等無他利害來錢出入滑易復上香願仕官髙遷復上香願縣官口舌疾病除愈一願一上香若爲他人願通亦無苦十上二十上三十上隨願齋日六時燒香寅午戌亥子丑是六時非齋日朝暮辰已之日天淸明夜半北向悔過向天地叩頭百下三十六搏頰三過三百下以爲常則先縁福深者通神在近先縁福淺者八年得仙明慎奉行如律令老君曰三㑹日道民就師治初上章籍時於靖前南正北向行立定位各八拜九叩頭九傅頰再拜伏地請章籍訖然後朝賀師明慎奉行如律令老君曰道官祭酒修行之法復歴民間東西南北行來出入直身直面一向直去不得左右顧盻到民家不得妄有瞋怒有呵譴食飲好惡牀席舍廬衆雜論說是非不可得先到貴豪富家苦顧歷民儀先到寒貧家教誨求福使科約具備明慎奉行如律令老君曰男女籙生及道民家有奴婢不得喚奴婢當呼字若有過事不得縱橫樸打但以理呼在前語甲乙汝有此事應得杖罰令受之若責數奴婢自當糺罪無有怨恨之心道官道民出言吐氣不得言說死事此道民之大忌明慎奉行如律令老君曰世間有承先父祖事道自作一法家宅香火復有承先祖作祭酒之官者民戸無知言父死子係更不正屬戸師民氓同婬祠邪令衆雜邪令非一倣言奉道見他官政治祭酒使復禮拜言我是道民意欲就正復懼衺神與之災考如此之人爲請作道會滿三約正誡若不從令勿復重請如此之徒奸情不已非是天民不如請諸不奉道之民何以爾者等是天民統一道治然則别屬有參㑹更好豈比之奉道無師而有衺心乎道官祭酒宜以參㑹更言據是民可請爲客此乃違失事多宜如詳酌若請爲客以刑律論明慎奉行如律今老君曰道民求福願㕑先剌客齋上中下齋隨意明當設㑹今日請客來在主人家中宿諸求願還官衆共保乃行出無他適雞鳴至日出盡皆上廚之列來致仙官唯解先亡廚平旦至日中爲限若人士從願到官一切郡縣及以公侯卿相伯子男封土隨意欲設廚可作耳求宰民得腹心土居安寧風雨時節隨意而設無有先科令不限人頭數不設亦復無苦但精勤香火明慎奉行如律令老君曰道氣百千萬重自從開闢黄燧之治門有仙聖從今以來人僞道荒經書舛錯後人詐僞仙經圖書人人造法天下經方百千萬億草藥萬種萬藥百數後人樂道長生循放無效者何然愚人意短不逹至妙長生至道仙聖相傳口訣授要不載於文籍自非齋功念定通神何能招致乗風駕龍仙官臨顧接而昇騰服食草藥石藥服而得力之者此則仙人奏表上聞遣仙人玉童玉女來下臨天官神藥參入分數一草一人得力一石一人得力服氣方法亦俱等同今世人豈能逹此理乎不降仙人何能登太清之階乎而案藥服之正可得除病壽終攘却毒氣瘟疫所不能中傷畢一世之年可兼榖養性建功齋靖解過除罪諸欲修學長生之人好共㝷諸誦誡建功香火齋練功成感徹之後長生可剋抱朴子者未明盖世掬合前賢諸家經方造經勸仙内外卷首言仙之可得可開悟人心承前多有遺經亦復不妄造出意不犯改經詐說之罪造經勸仙功過自保𥙷後身當得仙人之階諸有修道之人勿復承按前人僞書經律令世人習讀美經典可益得身朝但富貴爲子孫資䕃耳無有長生登仙之階欲求生道爲可先讀五千文最是要者明慎奉行如律令老君曰靖舍外隨地寛窄別作一重籬障壁東向門靖主人入靖處人及弟子盡在靖外香火時法靖主不得靖舍中飲食及著鞋靺入靖坐起言語最是求福大禁恐凡人入靖有取物盡皆束帶明慎奉行如律令老君曰道官道民有死亡七日後解穢家人爲亡人散生時財物作會隨人多少可參請俗民無苦爲亡人過度設會功滿三復欲設㑹隨意能備可作若不能備無苦勤香火明慎奉行如律令老君曰爲亡人設㑹燒香時道官一人靖壇中正東向籙生及主人亦東向各八拜九叩頭九摶頰三滿三過止各皆再拜懇若人多者亦可坐禮拜叩頭主稱官號姓字上啓無極大道萬萬至真無極大道以手捻香三上著鑪中口並言爲亡者甲乙解罪過燒香願言餘人以次到壇前懇上香如法盡各各訖靖主上章餘人當席拜主人東向叩頭上章訖設㑹解坐訖靖主入靖啓事爲主人求願收福言當時主人東向叩頭坐罷出時客向靖八拜而歸家焉主人一宿之中滿三過燒香明慎奉行如律令老君曰道民家有疾病告歸到宅師先令民香火在靖中民在靖外西向散髮叩頭謝寫𠎝違罪過令使皆盡未有藏匿求乞原赦若過一事不盡意不實心不信法章奏何解師亦自别啓事云民某甲求乞事及病者亦道首過若過盡者師自得好感應若過不盡師亦不得好感應報首過時爲可並行符承銜民首辭上章一日三過上三日後病人不降損可作解先亡謫罰章病家晝則向靖叩頭夜則北向向天地叩頭首過勿使一時有闕病家惶怖欲有所說錢財廚願勿聽之若能備廚請客三人五人十人以上隨人多少按如科法設會會時客主人病者考禮拜燒香求乞救度病者設會訖客歸到家爲病者燒香叩頭一宿之中滿三過以病者救度禮叩頭燒香同法明慎奉行如律令老君曰道民不慎科法淫犯殺生宜校𧷢物計錢使還民家自市廚具師得與表章解散當作會時主人衆客前向香火八拜叩頭三十六搏頰滿三訖再拜手捻香著鑪中並告言某甲啓太上大道甲乙是肉人無知奉科許祠某官求其事并復有以塞詰之者今依科輸𧷢直爲廚具請客證明以從今以後生死付道不敢以前爲比乞願得在赦格之例蒙恩生活道氣哀念明慎奉行如律令老君曰男女道官濁亂來久有作祭酒之宫積勤累世貪濁若身化領求復經數餘載𧷢錢逋說貪穢入已此是前造詐言經律此等之人盡在地獄若有罪重之者轉生蟲畜償罪難畢吾故出音樂新正科律依其頭領欲使信道以通人情淸身潔已與道同功太上清氣當來覆護與民更始改往修來一從新科爲正明慎奉行如律令老君曰道氣百千萬重前賢後聖修學長生盡遇仙官人人各得一重之氣而得昇度之後終不載於文籍房中之教通黄赤經契有百二十之法歩門庭之教亦無交差一言自從係天師道陵昇僊以來唯經有文在世解者爲是何人得長生飛仙者復是何人身中至要導引之訣盡在師口而筆諜之教以官人心若開解信之者執經一心香火自纓精練功成感悟真神與仙人交遊至訣可得今後人詐欺謾道愛神潤飭經文改錯法度妄造無端作諸僞行遂成風俗勸教天下男女受佩契令愚闇相傅不能自度而相領弟子惑亂百姓犯罪者衆招延災考濁欲道教毀損法身吾誦誡斷改黄赤更修清異之法與道同功其男女官籙生佩契黄赤者從今誡之後佩者不吉若有不慎之人所居止土地真官注氣靖治典者使音當自校録吾與之災考死入地獄若輪轉精魂蟲畜猪羊而生償罪難畢吾觀世人夫妻修行黄赤無有一條按天官本要所行專作濁穢手犯靖廬治官禁忌而天官仙人玉女尚不犯治室之法吾今以黄赤貪濁道教來久無有真正愚闇相傳盡各不得其中正時有清真潔素之人無經律錯亂吾盡欲災除此軰之人不令而犯誅誚之暴是以先令誡約遷遣一教然房中求生之本經契故有百餘法不在斷禁之列若夫妻樂法但懃進問清正之師按而行之任意所好傳一法亦可足矣今世濁惡有形之人流轉精神罪縁難消是以誡約要須齋功與返爲始雪罪除𠎝乃得感悟真仙男女官努力修齋㝷諸誦誡香火建功仙道不遠明慎奉行如律令老君曰從係天師昇仙以來曠官寘職道荒人濁後人諸官愚闇相傳自署治籙符契氣候倒錯不可承准吾本授二十四治上應二十八宿下應隂陽二十四氣授精進祭酒化領民户道陵演出道法初在蜀土一州之教板署男女道官因山川土地郡縣按吾治官靖廬亭宅與吾共同領化民户勸惡爲善陽平山名上配角宿餘山等同而後人道官不逹幽冥情狀故用蜀土盟法板署治職勑令文曰今𥙷某乙鶴鳴雲臺治權時籙署治氣職領化民戸質對治官文書須世太平遣還本治而九州土地之神章表文書皆由土地治官真神而得上逹有今聞道官章表時請召蜀土治宅君吏他方土地之神此則天永地隔人鬼胡越吾本下宿治號令之名領化民户道陵立山川土地宅治之名耳豈有須太平遣還本治者乎從今以後諸州郡縣男女有佩職籙者盡各詣師改宅治氣按今新科但還宿官稱治爲職號受二十四治中化契令者發號言𥙷甲乙正中官真氣角宿治以亢宿氏宿房宿二十八如法上章時直言臣而不得稱真人若靈籙外官不得稱治號其蜀土宅治之號勿復承用若係天師遺徹子孫在世精循治教領民化者不得信用諸官祭酒爲法律上章時不得單稱係天師位號當稱職號名與諸官同等明慎奉行如律令老君曰夫爲道官正治祭酒進善舉賢領受弟子授人職治誡籙符契進一賢善除過十年求仙速逹進一佞一惡反罪十年求仙求福終不可得其投道門之民欲爲弟子者當觀望情性與約誡相應者三年體能修慎法教精進善行心無有退志無傾邪乃可授籙誡納爲弟子明慎奉行如律令老君曰中官正氣宿治祭酒得授人職籙誡其籙生之人不得妄授人誡籙若不領民户受中治籙者當受中治散氣祭酒職若上靈官不領民户受外官散氣祭酒職其外官祭酒治民者坐㑹時百五十籙下坐若中官治民正氣祭酒子息受治署中官中官宿治散氣祭酒在父民聞行章稱文治氣上章若他官祭酒民聞自治氣上章若求生之人一身自度不化愚俗不領民户亦可直受中官上仙赤天七十五將軍籙生起亦在外治祭酒上明慎奉行如律令老君曰道官道民其先亡祖曽父母幽謫不解復注子孫若齋功不逹章書謬說多言十通百通無益於事要先齋感徹之後乃可章表證逹齋功章書之法不須多重重煩濁天曹不如不上齋滿百日一齋功逹表章之日兼能請賢隨多少人數設會拯捄收福益仁若不能備者但就師表章遷逹亡人若祭酒者日日可言齋功滿百日就師表章明慎奉行如律令老君音誦誡經
